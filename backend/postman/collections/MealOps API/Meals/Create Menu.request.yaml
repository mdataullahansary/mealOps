$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/meals/create-menu'
order: 1000
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "date": "2026-05-01",
      "breakfast": true,
      "lunch": true,
      "dinner": true
    }
