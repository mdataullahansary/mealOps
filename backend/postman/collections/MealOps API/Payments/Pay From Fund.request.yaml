$kind: http-request
method: POST
url: '{{baseUrl}}/api/v1/payment/pay-from-fund'
order: 8000
headers:
  - key: Authorization
    value: 'Bearer {{accessToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "amount": 1000,
      "reason": "Emergency grocery purchase"
    }
